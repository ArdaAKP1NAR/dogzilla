<!-- Notification Toast -->
<div id="toast" class="cart-toast">Canavar sepete eklendi! 🌭</div>

<!-- Cart Modal -->
<div id="cart-modal" class="cart-modal-overlay">
    <div class="cart-modal-content">
        <div class="cart-header">
            <h2>SEPETİM</h2>
            <button id="close-cart" class="close-btn">&times;</button>
        </div>
        <div id="cart-items" class="cart-body">
            <!-- Cart items will be dynamically inserted here -->
            <div class="empty-cart-msg">Sepetin şu an boş.</div>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>TOPLAM:</span>
                <span id="cart-total-price">0 TL</span>
            </div>
            <div class="cart-actions">
                <button id="btn-clear-cart" class="btn-secondary">TÜMÜNÜ SİL</button>
                <button id="btn-checkout" class="btn-primary">SİPARİŞİ ONAYLA</button>
            </div>
        </div>
    </div>
</div>
